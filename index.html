<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALS Sherwood Plant Locator</title>
<style>
body{
font-family:Arial,sans-serif;
margin:0;
padding:0;
background:#f4f7f2;
color:#1f3322;
}
header{
background:#1f5c2d;
color:white;
padding:20px;
text-align:center;
}
.container{
padding:16px;
max-width:800px;
margin:auto;
}
input, textarea, select{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:12px;
border-radius:8px;
border:1px solid #ccc;
box-sizing:border-box;
}
button{
background:#2f7d3c;
color:white;
border:none;
padding:12px 16px;
border-radius:8px;
cursor:pointer;
margin-right:8px;
margin-top:6px;
}
.card{
background:white;
padding:14px;
border-radius:12px;
margin-top:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
.small{
font-size:14px;
</html>
