<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ALS Sherwood Plant Locator</title>
<style>
  :root{
    --green:#1f5c2d;
    --green2:#2f7d3c;
    --light:#f4f7f2;
    --card:#ffffff;
    --text:#1f3322;
    --muted:#66736a;
    --line:#d9e2d7;
    --yellow:#fff7d6;
  }
  body{font-family:Arial,sans-serif;margin:0;padding:0;background:var(--light);color:var(--text);}
  header{background:var(--green);color:white;padding:18px 16px;text-align:center;}
  header h1{margin:0;font-size:24px;}
  header p{margin:6px 0 0;font-size:14px;}
  .container{padding:14px;max-width:900px;margin:auto;}
  .section{background:white;border-radius:14px;padding:14px;margin:12px 0;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
  h2{margin:4px 0 12px;font-size:20px;}
  h3{margin:0 0 6px;font-size:19px;}
  input,textarea,select{width:100%;padding:12px;margin-top:7px;margin-bottom:10px;border-radius:9px;border:1px solid #cfd8cf;box-sizing:border-box;font-size:16px;}
  textarea{min-height:72px;}
  button{background:var(--green2);color:white;border:none;padding:11px 14px;border-radius:9px;cursor:pointer;margin:4px 4px 4px 0;font-size:15px;}
  button.secondary{background:#607466;}
  button.danger{background:#9b3b35;}
  button.light{background:#eaf2e8;color:#23462a;border:1px solid var(--line);}
  .search-row{display:flex;gap:8px;align-items:center;}
  .search-row input{margin-bottom:6px;}
  .search-row button{white-space:nowrap;height:44px;}
  .suggestions{background:white;border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-top:4px;display:none;}
  .suggestion{padding:10px 12px;border-bottom:1px solid #eef2ed;cursor:pointer;}
  .suggestion:last-child{border-bottom:none;}
  .suggestion:hover{background:#f0f7ef;}
  .results-header{margin-top:12px;padding:10px 12px;border-radius:10px;background:var(--yellow);border:1px solid #eadb93;font-weight:bold;display:none;}
  .card{background:var(--card);padding:14px;border-radius:12px;margin-top:12px;border:1px solid var(--line);box-shadow:0 1px 5px rgba(0,0,0,0.06);}
  .badge{display:inline-block;padding:4px 8px;border-radius:999px;font-size:12px;background:#e6f0e5;color:#254b2c;margin:2px 4px 4px 0;}
  .location{font-size:18px;font-weight:bold;color:#174f24;margin:8px 0;}
  .field{margin:7px 0;line-height:1.35;}
  .label{font-weight:bold;color:#354739;}
  .muted{color:var(--muted);font-size:14px;}
  .botanical{font-style:italic;color:#374a3b;}
  .pronunciation{color:#5c6b61;font-size:14px;}
  .actions{margin-top:10px;}
  .grid{display:grid;grid-template-columns:1fr;gap:8px;}
  @media(min-width:700px){.grid.two{grid-template-columns:1fr 1fr;}}
  .small-note{font-size:13px;color:#5e6b61;}
  .count-pill{display:inline-block;background:#eaf2e8;border:1px solid var(--line);padding:5px 9px;border-radius:999px;font-size:13px;margin-top:6px;}
</style>
</head>
<body>

<header>
  <h1>ALS Sherwood Plant Locator</h1>
  <p>Fast plant lookup, table locations, and customer notes</p>
</header>

<div class="container">

  <div class="section" id="quickSearchSection">
    <h2>Quick Search</h2>
    <div class="search-row">
      <input id="quickSearch" placeholder="Start typing plant name, botanical, alias, location..." autocomplete="off" />
      <button class="light" onclick="clearSearch()">Clear</button>
    </div>
    <div id="suggestions" class="suggestions"></div>
    <div id="databaseCount" class="count-pill"></div>
    <div id="resultsHeader" class="results-header">Your Results</div>
    <div id="results"></div>
  </div>

  <div class="section">
    <h2>Add / Update Plant</h2>
    <div class="grid two">
      <input id="name" placeholder="Plant Name" />
      <select id="category">
        <option>Annual</option>
        <option selected>Perennial</option>
        <option>Shrub</option>
        <option>Tree</option>
        <option>Edible</option>
        <option>Houseplant</option>
        <option>Other</option>
      </select>
    </div>

    <div class="grid two">
      <input id="botanical" placeholder="Botanical Name" />
      <input id="pronunciation" placeholder="Botanical Pronunciation" />
    </div>

    <div class="grid two">
      <input id="location" placeholder="Store Location, e.g. Table 4" />
      <input id="price" placeholder="Price, optional" />
    </div>

    <div class="grid two">
      <input id="light" placeholder="Light, e.g. Sun / PM shade" />
      <input id="size" placeholder="Size, e.g. 3-4 ft" />
    </div>

    <div class="grid two">
      <input id="evergreen" placeholder="Evergreen?, e.g. Yes / No / Semi-evergreen" />
      <input id="aliases" placeholder="Aliases / search terms" />
    </div>

    <textarea id="notes" placeholder="Notes / customer tidbits"></textarea>

    <button onclick="savePlant()">Save Plant</button>
    <button class="secondary" onclick="clearForm()">Clear Form</button>
  </div>

  <div class="section">
    <h2>Import / Backup</h2>
    <p class="small-note">Import CSV files made from plant tags. Export backup often so you do not lose phone data.</p>
    <input type="file" id="csvFile" accept=".csv,text/csv" />
    <button onclick="importCSV()">Import CSV</button>
    <button class="secondary" onclick="undoLastImport()">Undo Last Import</button>
    <button class="light" onclick="clearFilePicker()">Clear Import File</button>
    <button class="secondary" onclick="exportBackup()">Export Backup CSV</button>
    <button class="danger" onclick="wipeAllData()">Nuclear Reset: Delete All Data</button>
  </div>

</div>

<script>
function safeLoadPlants(){
  try {
    const raw = localStorage.getItem('alsPlants');
    const parsed = raw ? JSON.parse(raw) : [];
    return Array.isArray(parsed) ? parsed : [];
  } catch(e) {
    alert("Saved plant data could not be read. Export backups regularly. The app will open with an empty working list until storage is fixed.");
    return [];
  }
}

let plants = safeLoadPlants();
let editingIndex = null;

const fields = {
  name: document.getElementById('name'),
  category: document.getElementById('category'),
  botanical: document.getElementById('botanical'),
  pronunciation: document.getElementById('pronunciation'),
  location: document.getElementById('location'),
  price: document.getElementById('price'),
  light: document.getElementById('light'),
  size: document.getElementById('size'),
  evergreen: document.getElementById('evergreen'),
  aliases: document.getElementById('aliases'),
  notes: document.getElementById('notes')
};

function makeId(){
  return 'p_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,10);
}

function normalizePlant(p){
  return {
    id: p.id || p["ID"] || makeId(),
    name: p.name || p["Plant Name"] || p["Name"] || "",
    category: p.category || p["Category"] || "Other",
    botanical: p.botanical || p["Botanical Name"] || "",
    pronunciation: p.pronunciation || p["Botanical Pronunciation"] || "",
    location: p.location || p["Location"] || "",
    price: p.price || p["Price"] || "",
    light: p.light || p["Light"] || "",
    size: p.size || p["Size"] || "",
    evergreen: p.evergreen || p["Evergreen"] || "",
    aliases: p.aliases || p["Aliases"] || "",
    notes: p.notes || p["Notes"] || ""
  };
}

function normalizeText(value){
  return String(value || "")
    .normalize("NFKD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/[’‘`´]/g, "'")
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, " ")
    .trim()
    .replace(/\s+/g, " ");
}

plants = plants.map(normalizePlant);
savePlants();
updateDatabaseCount();

function savePlants(){
  localStorage.setItem('alsPlants', JSON.stringify(plants));
  updateDatabaseCount();
}

function saveLastImportIds(ids){
  lastImportIds = ids || [];
  localStorage.setItem('alsLastImportIds', JSON.stringify(lastImportIds));
}

function updateDatabaseCount(){
  const el = document.getElementById('databaseCount');
  if(el) el.textContent = `${plants.length} saved plants. Search above to show results.`;
}

function plantSearchText(p){
  p = normalizePlant(p);
  return normalizeText([p.name,p.category,p.botanical,p.pronunciation,p.location,p.price,p.light,p.size,p.evergreen,p.aliases,p.notes].join(" "));
}

function savePlant(){
  const plant = {
    id: editingIndex !== null ? normalizePlant(plants[editingIndex]).id : makeId(),
    name: fields.name.value.trim(),
    category: fields.category.value.trim(),
    botanical: fields.botanical.value.trim(),
    pronunciation: fields.pronunciation.value.trim(),
    location: fields.location.value.trim(),
    price: fields.price.value.trim(),
    light: fields.light.value.trim(),
    size: fields.size.value.trim(),
    evergreen: fields.evergreen.value.trim(),
    aliases: fields.aliases.value.trim(),
    notes: fields.notes.value.trim()
  };

  if(!plant.name){
    alert("Please enter a plant name.");
    return;
  }

  if(editingIndex !== null){
    plants[editingIndex] = plant;
    editingIndex = null;
  } else {
    plants.push(plant);
  }

  savePlants();
  clearForm();
  clearSearch();
  alert("Plant saved.");
}

function clearForm(){
  Object.values(fields).forEach(el => {
    if(el.tagName === "SELECT") el.value = "Perennial";
    else el.value = "";
  });
  editingIndex = null;
}

function editPlant(index){
  const p = normalizePlant(plants[index]);
  fields.name.value = p.name;
  fields.category.value = p.category || "Other";
  fields.botanical.value = p.botanical;
  fields.pronunciation.value = p.pronunciation;
  fields.location.value = p.location;
  fields.price.value = p.price;
  fields.light.value = p.light;
  fields.size.value = p.size;
  fields.evergreen.value = p.evergreen;
  fields.aliases.value = p.aliases;
  fields.notes.value = p.notes;
  editingIndex = index;
  document.querySelectorAll(".section")[1].scrollIntoView({behavior:"smooth"});
}

function deletePlant(index){
  if(confirm("Delete this plant?")){
    plants.splice(index,1);
    savePlants();
    renderSearch();
  }
}

function escapeHTML(str){
  return String(str || "").replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]));
}

function renderCard(p, index){
  p = normalizePlant(p);
  const metaBadges = [p.category,p.light,p.evergreen].filter(Boolean).map(x => `<span class="badge">${escapeHTML(x)}</span>`).join("");

  return `
    <div class="card">
      <h3>${escapeHTML(p.name)}</h3>
      ${p.botanical ? `<div class="botanical">${escapeHTML(p.botanical)}</div>` : ""}
      ${p.pronunciation ? `<div class="pronunciation">Pronunciation: ${escapeHTML(p.pronunciation)}</div>` : ""}
      <div>${metaBadges}</div>
      ${p.location ? `<div class="location">📍 ${escapeHTML(p.location)}</div>` : `<div class="location">📍 Location not entered</div>`}
      ${p.price ? `<div class="field"><span class="label">Price:</span> ${escapeHTML(p.price)}</div>` : ""}
      ${p.size ? `<div class="field"><span class="label">Size:</span> ${escapeHTML(p.size)}</div>` : ""}
      ${p.aliases ? `<div class="field"><span class="label">Search aliases:</span> ${escapeHTML(p.aliases)}</div>` : ""}
      ${p.notes ? `<div class="field"><span class="label">Customer tidbits:</span><br>${escapeHTML(p.notes)}</div>` : ""}
      <div class="actions">
        <button onclick="editPlant(${index})">Edit</button>
        <button class="danger" onclick="deletePlant(${index})">Delete</button>
      </div>
    </div>
  `;
}

function getMatches(query){
  const q = normalizeText(query);
  if(!q) return [];
  return plants.map((p, i) => ({p: normalizePlant(p), i})).filter(item => plantSearchText(item.p).includes(q));
}

function renderSearch(){
  const q = document.getElementById('quickSearch').value;
  const results = document.getElementById('results');
  const header = document.getElementById('resultsHeader');
  const suggestions = document.getElementById('suggestions');
  const matches = getMatches(q);

  if(!q.trim()){
    results.innerHTML = "";
    header.style.display = "none";
    suggestions.style.display = "none";
    suggestions.innerHTML = "";
    return;
  }

  header.style.display = "block";
  header.textContent = matches.length ? `Your Results (${matches.length})` : "Your Results — No matches found";
  results.innerHTML = matches.map(item => renderCard(item.p, item.i)).join("");
  renderSuggestions(q, matches);
}

function renderSuggestions(q, matches){
  const suggestions = document.getElementById('suggestions');
  if(!q.trim() || !matches.length){
    suggestions.style.display = "none";
    suggestions.innerHTML = "";
    return;
  }

  suggestions.innerHTML = matches.slice(0,8).map(item => `
    <div class="suggestion" onclick="chooseSuggestionByIndex(${item.i})">
      <strong>${escapeHTML(item.p.name)}</strong>
      ${item.p.location ? `<span class="muted"> — ${escapeHTML(item.p.location)}</span>` : ""}
    </div>
  `).join("");
  suggestions.style.display = "block";
}

function chooseSuggestionByIndex(index){
  const plant = normalizePlant(plants[index]);
  document.getElementById('quickSearch').value = plant.name;
  document.getElementById('suggestions').style.display = "none";

  const results = document.getElementById('results');
  const header = document.getElementById('resultsHeader');

  header.style.display = "block";
  header.textContent = "Your Results (1)";
  results.innerHTML = renderCard(plant, index);
}

function clearSearch(){
  document.getElementById('quickSearch').value = "";
  document.getElementById('results').innerHTML = "";
  document.getElementById('resultsHeader').style.display = "none";
  document.getElementById('suggestions').innerHTML = "";
  document.getElementById('suggestions').style.display = "none";
}

document.getElementById('quickSearch').addEventListener('input', renderSearch);
document.getElementById('quickSearch').addEventListener('search', renderSearch);

function parseCSV(text){
  const rows = [];
  let current = "", row = [], inQuotes = false;
  for(let i=0; i<text.length; i++){
    const c = text[i], next = text[i+1];
    if(c === '"' && inQuotes && next === '"'){ current += '"'; i++; }
    else if(c === '"'){ inQuotes = !inQuotes; }
    else if(c === ',' && !inQuotes){ row.push(current); current = ""; }
    else if((c === '\n' || c === '\r') && !inQuotes){
      if(c === '\r' && next === '\n') i++;
      row.push(current);
      if(row.some(cell => cell.trim() !== "")) rows.push(row);
      row = []; current = "";
    } else current += c;
  }
  row.push(current);
  if(row.some(cell => cell.trim() !== "")) rows.push(row);
  return rows;
}

function plantKey(p){
  p = normalizePlant(p);
  return [
    normalizeText(p.name),
    normalizeText(p.location),
    normalizeText(p.botanical)
  ].join("|");
}

function importCSV(){
  const fileInput = document.getElementById('csvFile');
  const file = fileInput.files[0];
  if(!file){ alert("Choose a CSV file first."); return; }

  const reader = new FileReader();
  reader.onload = function(e){
    const rows = parseCSV(e.target.result);
    if(rows.length < 2){ alert("CSV appears empty or missing rows."); return; }

    const headers = rows[0].map(h => String(h || "").replace(/^\uFEFF/, "").trim());
    let imported = 0;
    let skipped = 0;
    const importedIds = [];

    const existingKeys = new Set(plants.map(p => plantKey(p)));

    for(let r=1; r<rows.length; r++){
      const obj = {};
      headers.forEach((h, i) => obj[h] = rows[r][i] || "");
      const plant = normalizePlant(obj);

      if(plant.name){
        plant.id = makeId();
        const key = plantKey(plant);
        if(existingKeys.has(key)){
          skipped++;
        } else {
          plants.push(plant);
          existingKeys.add(key);
          importedIds.push(plant.id);
          imported++;
        }
      }
    }

    savePlants();
    saveLastImportIds(importedIds);
    clearFilePicker();
    clearSearch();
    alert(`Imported ${imported} new plants. Skipped ${skipped} duplicates. ${imported ? "You can undo this import if needed." : ""}`);
  };
  reader.readAsText(file);
}

function undoLastImport(){
  if(!lastImportIds || !lastImportIds.length){
    alert("There is no recent import batch to undo.");
    return;
  }

  const count = lastImportIds.length;
  const ok = confirm(`Undo the last import and remove ${count} plant record(s)? This will not remove manually entered plants or earlier imports.`);
  if(!ok) return;

  const idSet = new Set(lastImportIds);
  const before = plants.length;
  plants = plants.filter(p => !idSet.has(normalizePlant(p).id));
  const removed = before - plants.length;

  savePlants();
  saveLastImportIds([]);
  clearSearch();
  alert(`Removed ${removed} plant record(s) from the last import.`);
}

function clearFilePicker(){
  document.getElementById('csvFile').value = "";
}

function csvEscape(value){
  const s = String(value || "");
  if(/[",\n\r]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}

function exportBackup(){
  const headers = ["ID","Plant Name","Botanical Name","Botanical Pronunciation","Category","Location","Price","Light","Size","Evergreen","Notes","Aliases"];
  const lines = [headers.join(",")];

  plants.map(normalizePlant).forEach(p => {
    lines.push([p.id,p.name,p.botanical,p.pronunciation,p.category,p.location,p.price,p.light,p.size,p.evergreen,p.notes,p.aliases].map(csvEscape).join(","));
  });

  const blob = new Blob(['\uFEFF' + lines.join("\n")], {type:"text/csv;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "als-plant-locator-backup.csv";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

clearSearch();
</script>

</body>
</html>
