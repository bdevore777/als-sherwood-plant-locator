<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ALS Sherwood Plant Locator</title>
<style>
  :root{
    --green:#1f5c2d;
    --green2:#2f7d3c;
    --light:#f4f7f2;
    --card:#ffffff;
    --text:#1f3322;
    --muted:#66736a;
    --border:#d6ddd5;
    --warn:#a63d2a;
  }
  body{font-family:Arial, sans-serif;margin:0;background:var(--light);color:var(--text);}
  header{background:var(--green);color:white;padding:18px 16px;text-align:center;}
  header h1{margin:0;font-size:24px;}
  header p{margin:6px 0 0;font-size:14px;opacity:.9;}
  .container{padding:14px;max-width:850px;margin:0 auto;}
  .panel{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;margin:12px 0;box-shadow:0 2px 8px rgba(0,0,0,.06);}
  .stickySearch{position:sticky;top:0;z-index:10;background:var(--light);padding-top:8px;padding-bottom:4px;}
  h2{margin:4px 0 10px;font-size:20px;}
  h3{margin:0 0 6px;font-size:18px;}
  label{display:block;font-weight:bold;margin-top:10px;font-size:14px;}
  input,textarea,select{width:100%;padding:12px;margin-top:6px;border-radius:10px;border:1px solid #bcc8bf;box-sizing:border-box;font-size:16px;background:white;}
  textarea{min-height:72px;resize:vertical;}
  .row{display:flex;gap:8px;align-items:center;}
  .row > *{flex:1;}
  button{background:var(--green2);color:white;border:none;padding:11px 14px;border-radius:10px;cursor:pointer;font-weight:bold;font-size:15px;margin-top:8px;}
  button.secondary{background:#e8efe8;color:var(--green);border:1px solid #c9d6c9;}
  button.danger{background:#ffe9e4;color:var(--warn);border:1px solid #efc3b8;}
  button.smallBtn{padding:9px 11px;font-size:14px;white-space:nowrap;}
  .card{background:white;padding:14px;border-radius:14px;margin-top:10px;border:1px solid var(--border);box-shadow:0 1px 5px rgba(0,0,0,.05);}
  .small{font-size:13px;color:var(--muted);}
  .location{font-size:18px;font-weight:bold;color:var(--green);margin:8px 0;}
  .pill{display:inline-block;padding:4px 8px;border-radius:999px;background:#e8efe8;color:var(--green);font-size:12px;font-weight:bold;margin:2px 4px 2px 0;}
  .resultsHeader{background:#e0ebdf;border:1px solid #c7d9c7;border-radius:12px;padding:10px;margin-top:10px;font-weight:bold;}
  .empty{padding:12px;border-radius:12px;background:#fff8e6;border:1px solid #ead99f;color:#6b591c;margin-top:10px;}
  .suggestions{background:white;border:1px solid var(--border);border-radius:12px;margin-top:6px;overflow:hidden;display:none;}
  .suggestion{padding:11px 12px;border-bottom:1px solid #edf1ed;cursor:pointer;}
  .suggestion:last-child{border-bottom:0;}
  .suggestion:hover{background:#f0f7ef;}
  .tools{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
  .tools button{margin-top:0;}
  .fileLine{display:flex;gap:8px;align-items:center;margin-top:8px;}
  .fileLine input{margin:0;}
  .hidden{display:none;}
</style>
</head>
<body>
<header>
  <h1>ALS Sherwood Plant Locator</h1>
  <p>Fast lookup + personal location notes</p>
</header>

<div class="container">
  <div class="stickySearch">
    <div class="panel">
      <h2>Quick Search</h2>
      <div class="row">
        <input id="quickSearch" type="search" placeholder="Start typing: hydrangea, fern, tomato..." autocomplete="off" oninput="handleQuickSearch()" />
        <button class="secondary smallBtn" onclick="clearQuickSearch()">Clear</button>
      </div>
      <div id="suggestions" class="suggestions"></div>
      <div id="quickResults"></div>
    </div>
  </div>

  <div class="panel">
    <h2>Add / Update Plant</h2>
    <label>Plant Name</label>
    <input id="name" placeholder="Example: Bigleaf Hydrangea" list="plantNames" />
    <datalist id="plantNames"></datalist>

    <label>Category</label>
    <select id="category">
      <option>Annual</option>
      <option>Perennial</option>
      <option>Shrub</option>
      <option>Tree</option>
      <option>Edible</option>
      <option>Houseplant</option>
      <option>Vine / Groundcover</option>
      <option>Other</option>
    </select>

    <label>Store Location</label>
    <input id="location" placeholder="Example: Shrub Row 4 / Table 2" />

    <label>Notes</label>
    <textarea id="notes" placeholder="Example: Also sold as mophead hydrangea; ask lead if not on table."></textarea>

    <div class="tools">
      <button onclick="savePlant()">Save / Update Plant</button>
      <button class="secondary" onclick="clearForm()">Clear Form</button>
    </div>
  </div>

  <div class="panel">
    <h2>Import / Backup</h2>
    <p class="small">Import CSV columns: Plant Name, Category, Location, Notes. Export creates a backup of your saved plants.</p>
    <div class="fileLine">
      <input id="csvFile" type="file" accept=".csv,text/csv" />
      <button class="secondary smallBtn" onclick="clearImportFile()">Clear File</button>
    </div>
    <div class="tools">
      <button onclick="importCSV()">Import CSV</button>
      <button class="secondary" onclick="exportCSV()">Export Backup CSV</button>
    </div>
  </div>

  <div class="panel">
    <h2>All Saved Plants</h2>
    <div class="row">
      <select id="categoryFilter" onchange="renderAllPlants()">
        <option value="">All Categories</option>
        <option>Annual</option>
        <option>Perennial</option>
        <option>Shrub</option>
        <option>Tree</option>
        <option>Edible</option>
        <option>Houseplant</option>
        <option>Vine / Groundcover</option>
        <option>Other</option>
      </select>
      <button class="secondary smallBtn" onclick="renderAllPlants()">Refresh</button>
    </div>
    <div id="allPlants"></div>
  </div>
</div>

<script>
let plants = JSON.parse(localStorage.getItem('alsPlantsV6') || localStorage.getItem('alsPlantsV5') || localStorage.getItem('alsPlants') || '[]');

function normalize(s){ return (s || '').trim(); }
function keyFor(name){ return normalize(name).toLowerCase(); }
function savePlants(){ localStorage.setItem('alsPlantsV6', JSON.stringify(plants)); refreshDatalist(); }

function refreshDatalist(){
  const dl = document.getElementById('plantNames');
  dl.innerHTML = '';
  [...new Set(plants.map(p => p.name).filter(Boolean))].sort().forEach(n => {
    const opt = document.createElement('option'); opt.value = n; dl.appendChild(opt);
  });
}

function savePlant(){
  const name = normalize(document.getElementById('name').value);
  if(!name){ alert('Enter a plant name first.'); return; }
  const plant = {
    name,
    category: document.getElementById('category').value,
    location: normalize(document.getElementById('location').value),
    notes: normalize(document.getElementById('notes').value)
  };
  const idx = plants.findIndex(p => keyFor(p.name) === keyFor(name));
  if(idx >= 0){ plants[idx] = plant; } else { plants.push(plant); }
  savePlants();
  clearForm();
  renderAllPlants();
  clearQuickSearch();
  alert('Plant saved.');
}

function clearForm(){
  document.getElementById('name').value='';
  document.getElementById('category').value='Annual';
  document.getElementById('location').value='';
  document.getElementById('notes').value='';
}

function editPlant(i){
  const p = plants[i];
  document.getElementById('name').value = p.name || '';
  document.getElementById('category').value = p.category || 'Other';
  document.getElementById('location').value = p.location || '';
  document.getElementById('notes').value = p.notes || '';
  window.scrollTo({top: document.querySelector('.panel:nth-of-type(2)').offsetTop - 10, behavior:'smooth'});
}

function deletePlant(i){
  if(confirm('Delete this plant?')){
    plants.splice(i,1); savePlants(); renderAllPlants(); handleQuickSearch();
  }
}

function matchPlants(q){
  q = keyFor(q);
  if(!q) return [];
  return plants.filter(p =>
    keyFor(p.name).includes(q) ||
    keyFor(p.category).includes(q) ||
    keyFor(p.location).includes(q) ||
    keyFor(p.notes).includes(q)
  );
}

function handleQuickSearch(){
  const input = document.getElementById('quickSearch');
  const q = input.value;
  const suggestions = document.getElementById('suggestions');
  const results = document.getElementById('quickResults');

  if(!normalize(q)){
    suggestions.innerHTML=''; suggestions.style.display='none'; results.innerHTML='';
    return;
  }

  const matches = matchPlants(q);
  const nameMatches = matches.slice(0,6);
  suggestions.innerHTML = nameMatches.map(p => `<div class="suggestion" onclick="selectSuggestion('${escapeAttr(p.name)}')"><strong>${escapeHtml(p.name)}</strong><br><span class="small">${escapeHtml(p.category||'')} • ${escapeHtml(p.location||'No location saved')}</span></div>`).join('');
  suggestions.style.display = nameMatches.length ? 'block' : 'none';

  renderQuickResults(matches, q);
}

function clearQuickSearch(){
  document.getElementById('quickSearch').value='';
  document.getElementById('suggestions').innerHTML='';
  document.getElementById('suggestions').style.display='none';
  document.getElementById('quickResults').innerHTML='';
}

function selectSuggestion(name){
  document.getElementById('quickSearch').value = name;
  document.getElementById('suggestions').innerHTML='';
  document.getElementById('suggestions').style.display='none';
  renderQuickResults(matchPlants(name), name);
}

function renderQuickResults(list, q){
  const box = document.getElementById('quickResults');
  if(!normalize(q)){ box.innerHTML=''; return; }
  if(!list.length){ box.innerHTML = `<div class="empty"><strong>Your Results</strong><br>No saved plants found for “${escapeHtml(q)}”.</div>`; return; }
  box.innerHTML = `<div class="resultsHeader">Your Results: ${list.length} match${list.length===1?'':'es'} for “${escapeHtml(q)}”</div>` + list.map((p)=> plantCard(p, plants.indexOf(p))).join('');
}

function plantCard(p,i){
  return `<div class="card">
    <h3>${escapeHtml(p.name || '')}</h3>
    <span class="pill">${escapeHtml(p.category || 'Other')}</span>
    <div class="location">${escapeHtml(p.location || 'No location saved yet')}</div>
    ${p.notes ? `<p>${escapeHtml(p.notes)}</p>` : ''}
    <button class="secondary smallBtn" onclick="editPlant(${i})">Edit</button>
    <button class="danger smallBtn" onclick="deletePlant(${i})">Delete</button>
  </div>`;
}

function renderAllPlants(){
  const filter = document.getElementById('categoryFilter').value;
  const box = document.getElementById('allPlants');
  const list = plants
    .map((p,i)=>({p,i}))
    .filter(x => !filter || x.p.category === filter)
    .sort((a,b)=>(a.p.name||'').localeCompare(b.p.name||''));
  if(!list.length){ box.innerHTML='<div class="empty">No saved plants yet.</div>'; return; }
  box.innerHTML = `<div class="resultsHeader">Saved Plants: ${list.length}</div>` + list.map(x => plantCard(x.p,x.i)).join('');
}

function clearImportFile(){
  const input = document.getElementById('csvFile');
  input.value = '';
}

function importCSV(){
  const fileInput = document.getElementById('csvFile');
  const file = fileInput.files[0];
  if(!file){ alert('Choose a CSV file first.'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    const text = e.target.result;
    const rows = parseCSV(text);
    let added = 0, updated = 0;
    rows.forEach((row,idx) => {
      if(idx === 0 && /plant|name/i.test(row[0]||'')) return;
      const name = normalize(row[0]);
      if(!name) return;
      const plant = { name, category: normalize(row[1]) || 'Other', location: normalize(row[2]), notes: normalize(row[3]) };
      const existing = plants.findIndex(p => keyFor(p.name) === keyFor(name));
      if(existing >= 0){ plants[existing] = plant; updated++; } else { plants.push(plant); added++; }
    });
    savePlants(); renderAllPlants(); clearQuickSearch(); clearImportFile();
    alert(`Import complete. Added ${added}, updated ${updated}.`);
  };
  reader.readAsText(file);
}

function exportCSV(){
  const header = ['Plant Name','Category','Location','Notes'];
  const rows = plants.map(p => [p.name,p.category,p.location,p.notes]);
  const csv = [header,...rows].map(r => r.map(csvEscape).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'als-plant-locator-backup.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

function parseCSV(text){
  const rows=[]; let row=[]; let cur=''; let quote=false;
  for(let i=0;i<text.length;i++){
    const c=text[i], n=text[i+1];
    if(c==='"' && quote && n==='"'){ cur+='"'; i++; }
    else if(c==='"'){ quote=!quote; }
    else if(c===',' && !quote){ row.push(cur); cur=''; }
    else if((c==='\n' || c==='\r') && !quote){
      if(c==='\r' && n==='\n') i++;
      row.push(cur); rows.push(row); row=[]; cur='';
    } else cur+=c;
  }
  if(cur || row.length){ row.push(cur); rows.push(row); }
  return rows;
}

function csvEscape(v){
  v = v == null ? '' : String(v);
  return /[",\n]/.test(v) ? '"' + v.replace(/"/g,'""') + '"' : v;
}
function escapeHtml(s){ return String(s ?? '').replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
function escapeAttr(s){ return String(s ?? '').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,' '); }

refreshDatalist();
renderAllPlants();
</script>
</body>
</html>
