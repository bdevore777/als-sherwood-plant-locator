<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALS Sherwood Plant Locator</title>

<style>
body{
  font-family:Arial,sans-serif;
  margin:0;
  padding:0;
  background:#f4f7f2;
  color:#1f3322;
}

header{
  background:#1f5c2d;
  color:white;
  padding:20px;
  text-align:center;
}

.container{
  padding:16px;
  max-width:800px;
  margin:auto;
}

input,textarea,select{
  width:100%;
  padding:12px;
  margin-top:8px;
  margin-bottom:12px;
  border-radius:8px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

button{
  background:#2f7d3c;
  color:white;
  border:none;
  padding:12px 16px;
  border-radius:8px;
  cursor:pointer;
  margin-top:8px;
}

.card{
  background:white;
  padding:14px;
  border-radius:12px;
  margin-top:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.small{
  font-size:14px;
  color:#666;
}
</style>
</head>

<body>

<header>
<h1>ALS Sherwood Plant Locator</h1>
<p>Personal plant location tracker for Al's Garden & Home</p>
</header>

<div class="container">

<h2>Add Plant</h2>

<input id="name" placeholder="Plant Name">

<select id="category">
<option>Annual</option>
<option>Perennial</option>
<option>Shrub</option>
<option>Tree</option>
<option>Edible</option>
<option>Houseplant</option>
<option>Other</option>
</select>

<input id="location" placeholder="Store Location">

<textarea id="notes" placeholder="Notes"></textarea>

<button onclick="addPlant()">Save Plant</button>

<hr>

<h2>Search</h2>

<input id="search" placeholder="Search plants..." onkeyup="renderPlants()">

<div id="results"></div>

</div>

<script>

let plants = JSON.parse(localStorage.getItem('alsPlants') || '[]');

function savePlants(){
  localStorage.setItem('alsPlants', JSON.stringify(plants));
}

function addPlant(){

  const plant = {
    name: document.getElementById('name').value,
    category: document.getElementById('category').value,
    location: document.getElementById('location').value,
    notes: document.getElementById('notes').value
  };

  plants.push(plant);

  savePlants();

  renderPlants();

  alert('Plant saved');

  document.getElementById('name').value='';
  document.getElementById('location').value='';
  document.getElementById('notes').value='';
}

function renderPlants(){

  const q = document.getElementById('search').value.toLowerCase();

  const results = document.getElementById('results');

  results.innerHTML='';

  plants
    .filter(p =>
      p.name.toLowerCase().includes(q) ||
      p.category.toLowerCase().includes(q) ||
      p.location.toLowerCase().includes(q)
    )
    .forEach((p,i)=>{

      const div = document.createElement('div');

      div.className='card';

      div.innerHTML=`
        <h3>${p.name}</h3>
        <div class="small">${p.category}</div>
        <p><strong>Location:</strong> ${p.location}</p>
        <p>${p.notes}</p>
        <button onclick="deletePlant(${i})">Delete</button>
      `;

      results.appendChild(div);

    });

}

function deletePlant(i){

  plants.splice(i,1);

  savePlants();

  renderPlants();

}

renderPlants();

</script>

</body>
</html>
