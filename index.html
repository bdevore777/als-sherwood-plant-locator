<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ALS Sherwood Plant Locator</title>
<style>
:root{
  --green:#1f5c2d;
  --green2:#2f7d3c;
  --soft:#f4f7f2;
  --card:#ffffff;
  --line:#d6dfd3;
  --text:#1f3322;
  --muted:#657062;
  --warn:#fff6d8;
}
*{box-sizing:border-box;}
body{font-family:Arial,Helvetica,sans-serif;margin:0;background:var(--soft);color:var(--text);}
header{background:linear-gradient(135deg,var(--green),#2e7440);color:white;padding:18px 16px;text-align:center;position:sticky;top:0;z-index:5;box-shadow:0 2px 8px rgba(0,0,0,.14)}
header h1{font-size:22px;margin:0 0 4px 0;}
header p{font-size:13px;margin:0;opacity:.92;}
.container{padding:14px;max-width:900px;margin:0 auto 60px;}
.panel{background:white;border-radius:16px;padding:14px;margin:12px 0;box-shadow:0 2px 8px rgba(0,0,0,.08);border:1px solid #e2e8df;}
label{font-weight:700;font-size:13px;display:block;margin-top:8px;}
input,textarea,select{width:100%;padding:13px;border-radius:10px;border:1px solid #bdc9b9;font-size:16px;margin:7px 0 10px;background:white;}
textarea{min-height:80px;resize:vertical;}
button{background:var(--green2);color:white;border:0;padding:12px 14px;border-radius:10px;font-weight:700;font-size:15px;margin:5px 5px 5px 0;cursor:pointer;}
button.secondary{background:#eef4ec;color:var(--green);border:1px solid #bfd0ba;}
button.danger{background:#a83b32;}
button.small{padding:8px 10px;font-size:13px;}
.row{display:flex;gap:8px;align-items:center;}
.row > *{flex:1;}
.searchWrap{position:relative;}
#quickSearch{font-size:18px;padding-right:48px;border:2px solid var(--green2);}
.clearBtn{position:absolute;right:7px;top:8px;width:34px;height:34px;border-radius:50%;padding:0;margin:0;background:#e9efe6;color:#244d2b;border:1px solid #c7d5c2;font-size:20px;line-height:34px;}
.suggestions{position:absolute;top:58px;left:0;right:0;background:white;border:1px solid #cbd8c7;border-radius:12px;box-shadow:0 5px 18px rgba(0,0,0,.18);z-index:10;overflow:hidden;display:none;}
.suggestion{padding:12px;border-bottom:1px solid #edf2eb;cursor:pointer;}
.suggestion:last-child{border-bottom:0;}
.suggestion strong{display:block;}
.suggestion span{font-size:13px;color:var(--muted);}
.resultsHeader{background:var(--green);color:white;border-radius:14px 14px 0 0;padding:12px 14px;margin-top:14px;font-weight:800;display:flex;justify-content:space-between;align-items:center;}
.resultsHeader .count{background:white;color:var(--green);padding:4px 9px;border-radius:999px;font-size:13px;}
.resultsBox{border:2px solid var(--green);border-top:0;border-radius:0 0 14px 14px;padding:10px;background:#f9fbf7;min-height:70px;}
.card{background:var(--card);padding:13px;border-radius:13px;margin:10px 0;box-shadow:0 2px 6px rgba(0,0,0,.08);border:1px solid #e2e8df;}
.card h3{margin:0 0 4px;font-size:18px;}
.badge{display:inline-block;background:#eaf3e6;color:#215c2c;border:1px solid #c8d9c2;border-radius:999px;padding:4px 8px;font-size:12px;font-weight:700;margin:2px 0 8px;}
.loc{font-size:17px;background:#fff6d8;border-left:5px solid #c99625;padding:9px;border-radius:8px;margin:8px 0;}
.muted{color:var(--muted);font-size:13px;}
.empty{padding:14px;color:#566152;font-style:italic;}
.tabs{display:flex;gap:6px;overflow-x:auto;padding:4px 0;}
.tab{white-space:nowrap;background:#edf4ea;color:#265d2f;border:1px solid #c9dac4;border-radius:999px;padding:8px 11px;font-size:13px;font-weight:700;}
.tab.active{background:var(--green);color:white;}
.hidden{display:none;}
.fileRow{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
hr{border:0;border-top:1px solid var(--line);margin:16px 0;}
@media (max-width:560px){.row{display:block;} header h1{font-size:20px;} .container{padding:10px;} }
</style>
</head>
<body>
<header>
  <h1>ALS Sherwood Plant Locator</h1>
  <p>Fast personal plant-location tracker • v5</p>
</header>
<div class="container">

  <section class="panel">
    <label for="quickSearch">Quick Search</label>
    <div class="searchWrap">
      <input id="quickSearch" placeholder="Start typing: hyd, hosta, tomato..." autocomplete="off" oninput="handleQuickSearch()" onfocus="handleQuickSearch()" />
      <button class="clearBtn" onclick="clearQuickSearch()" aria-label="Clear search">×</button>
      <div id="quickSuggestions" class="suggestions"></div>
    </div>
    <div class="tabs" id="categoryTabs"></div>
  </section>

  <div class="resultsHeader">
    <span>Your Results</span>
    <span class="count" id="resultCount">0</span>
  </div>
  <section class="resultsBox" id="results"></section>

  <section class="panel">
    <h2 id="formTitle">Add / Update Plant</h2>
    <input type="hidden" id="editIndex" />
    <label>Plant Name</label>
    <input id="name" placeholder="Example: Bigleaf Hydrangea" list="plantNameList" />
    <datalist id="plantNameList"></datalist>
    <label>Category</label>
    <select id="category">
      <option>Annual</option><option>Perennial</option><option>Shrub</option><option>Tree</option><option>Edible</option><option>Houseplant</option><option>Vine / Groundcover</option><option>Other</option>
    </select>
    <label>Store Location</label>
    <input id="location" placeholder="Example: Shrub lot Row 3 / Table 2" />
    <label>Notes</label>
    <textarea id="notes" placeholder="Example: Mophead type, part sun, ask lead if not on main table"></textarea>
    <button onclick="savePlantFromForm()">Save Plant</button>
    <button class="secondary" onclick="resetForm()">Clear Form</button>
  </section>

  <section class="panel">
    <h2>Import / Backup</h2>
    <p class="muted">CSV format: Plant Name, Category, Location, Notes. Export often so your work is backed up.</p>
    <div class="fileRow">
      <input type="file" id="csvFile" accept=".csv,text/csv" />
      <button onclick="importCSV()">Import CSV</button>
      <button class="secondary" onclick="exportCSV()">Export Backup CSV</button>
    </div>
  </section>

</div>
<script>
const STORAGE_KEY = 'alsSherwoodPlantLocatorV4';
let plants = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let activeCategory = 'All';
const categories = ['All','Annual','Perennial','Shrub','Tree','Edible','Houseplant','Vine / Groundcover','Other'];

function persist(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(plants)); updateDatalist(); }
function normalize(s){ return String(s || '').toLowerCase().trim(); }
function escapeHtml(s){ return String(s || '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }

function updateDatalist(){
  const dl = document.getElementById('plantNameList');
  dl.innerHTML = [...new Set(plants.map(p=>p.name).filter(Boolean))].sort().map(n=>`<option value="${escapeHtml(n)}"></option>`).join('');
}

function renderTabs(){
  const box = document.getElementById('categoryTabs');
  box.innerHTML = categories.map(c => `<button class="tab ${c===activeCategory?'active':''}" onclick="setCategory('${c.replace(/'/g,"\\'")}')">${c}</button>`).join('');
}
function setCategory(cat){ activeCategory = cat; renderTabs(); renderResults(); handleQuickSearch(); }

function filteredPlants(){
  const q = normalize(document.getElementById('quickSearch').value);
  return plants.filter(p => {
    const catOk = activeCategory === 'All' || p.category === activeCategory;
    const text = normalize([p.name,p.category,p.location,p.notes].join(' '));
    const qOk = !q || text.includes(q);
    return catOk && qOk;
  });
}

function renderResults(list){
  const results = document.getElementById('results');
  const data = list || filteredPlants();
  document.getElementById('resultCount').textContent = data.length;
  if(!plants.length){
    results.innerHTML = '<div class="empty">No plants saved yet. Add your first plant below, or import a CSV.</div>';
    return;
  }
  if(!data.length){
    results.innerHTML = '<div class="empty">No matching results. Try fewer letters, clear search, or add this plant below.</div>';
    return;
  }
  results.innerHTML = data.map(p => {
    const i = plants.indexOf(p);
    return `<div class="card">
      <h3>${escapeHtml(p.name)}</h3>
      <span class="badge">${escapeHtml(p.category || 'Other')}</span>
      <div class="loc"><strong>Location:</strong> ${escapeHtml(p.location || 'No location saved yet')}</div>
      ${p.notes ? `<p>${escapeHtml(p.notes)}</p>` : '<p class="muted">No notes saved.</p>'}
      <button class="small" onclick="editPlant(${i})">Edit</button>
      <button class="small danger" onclick="deletePlant(${i})">Delete</button>
    </div>`;
  }).join('');
}

function handleQuickSearch(){
  const q = normalize(document.getElementById('quickSearch').value);
  const sug = document.getElementById('quickSuggestions');
  renderResults();
  if(!q){ sug.style.display='none'; sug.innerHTML=''; return; }
  const matches = plants.filter(p => {
    const catOk = activeCategory === 'All' || p.category === activeCategory;
    return catOk && normalize(p.name).includes(q);
  }).slice(0,8);
  if(!matches.length){ sug.style.display='none'; sug.innerHTML=''; return; }
  sug.innerHTML = matches.map(p => {
    const i = plants.indexOf(p);
    return `<div class="suggestion" onclick="chooseSuggestion(${i})"><strong>${escapeHtml(p.name)}</strong><span>${escapeHtml(p.category)} • ${escapeHtml(p.location || 'No location')}</span></div>`;
  }).join('');
  sug.style.display='block';
}
function chooseSuggestion(i){
  document.getElementById('quickSearch').value = plants[i].name;
  document.getElementById('quickSuggestions').style.display='none';
  renderResults([plants[i]]);
}
function clearQuickSearch(){
  document.getElementById('quickSearch').value='';
  document.getElementById('quickSuggestions').style.display='none';
  renderResults();
  document.getElementById('quickSearch').focus();
}

document.addEventListener('click', e => {
  if(!e.target.closest('.searchWrap')) document.getElementById('quickSuggestions').style.display='none';
});

function savePlantFromForm(){
  const plant = {
    name: document.getElementById('name').value.trim(),
    category: document.getElementById('category').value,
    location: document.getElementById('location').value.trim(),
    notes: document.getElementById('notes').value.trim()
  };
  if(!plant.name){ alert('Enter a plant name first.'); return; }
  const edit = document.getElementById('editIndex').value;
  if(edit !== '') plants[Number(edit)] = plant; else plants.push(plant);
  plants.sort((a,b)=>a.name.localeCompare(b.name));
  persist(); resetForm(); renderResults(); alert('Plant saved');
}
function editPlant(i){
  const p = plants[i];
  document.getElementById('editIndex').value = i;
  document.getElementById('formTitle').textContent = 'Update Plant';
  document.getElementById('name').value = p.name || '';
  document.getElementById('category').value = p.category || 'Other';
  document.getElementById('location').value = p.location || '';
  document.getElementById('notes').value = p.notes || '';
  window.scrollTo({top: document.getElementById('formTitle').offsetTop - 80, behavior:'smooth'});
}
function resetForm(){
  document.getElementById('editIndex').value='';
  document.getElementById('formTitle').textContent='Add / Update Plant';
  document.getElementById('name').value='';
  document.getElementById('category').value='Annual';
  document.getElementById('location').value='';
  document.getElementById('notes').value='';
}
function deletePlant(i){
  if(confirm('Delete this plant?')){ plants.splice(i,1); persist(); renderResults(); }
}

function parseCSVLine(line){
  const out=[]; let cur=''; let inQ=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"' && line[i+1]==='"'){cur+='"'; i++;}
    else if(ch==='"'){inQ=!inQ;}
    else if(ch===',' && !inQ){out.push(cur); cur='';}
    else cur+=ch;
  }
  out.push(cur); return out;
}
function importCSV(){
  const f = document.getElementById('csvFile').files[0];
  if(!f){ alert('Choose a CSV file first.'); return; }
  const reader = new FileReader();
  reader.onload = () => {
    const lines = reader.result.split(/\r?\n/).filter(l=>l.trim());
    let added=0;
    lines.forEach((line,idx)=>{
      const cols = parseCSVLine(line).map(c=>c.trim());
      if(idx===0 && normalize(cols[0]).includes('plant')) return;
      if(!cols[0]) return;
      plants.push({name:cols[0], category:cols[1]||'Other', location:cols[2]||'', notes:cols.slice(3).join(', ')||''});
      added++;
    });
    plants.sort((a,b)=>a.name.localeCompare(b.name)); persist(); renderResults(); alert(`Imported ${added} plants.`);
  };
  reader.readAsText(f);
}
function csvEscape(v){ return '"' + String(v||'').replace(/"/g,'""') + '"'; }
function exportCSV(){
  const rows = [['Plant Name','Category','Location','Notes'], ...plants.map(p=>[p.name,p.category,p.location,p.notes])];
  const csv = rows.map(r=>r.map(csvEscape).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='als-sherwood-plant-locator-backup.csv'; a.click();
  URL.revokeObjectURL(url);
}

renderTabs(); updateDatalist(); renderResults();
</script>
</body>
</html>
