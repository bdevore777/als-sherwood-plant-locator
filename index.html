<!DOCTYPE html>
<hr>

<h2>Search</h2>
<input id="search" placeholder="Search plants..." onkeyup="renderPlants()">

<div id="results"></div>

</div>

<script>
let plants = JSON.parse(localStorage.getItem('alsPlants') || '[]');

function savePlants(){
localStorage.setItem('alsPlants', JSON.stringify(plants));
}

function addPlant(){
const plant = {
name: document.getElementById('name').value,
category: document.getElementById('category').value,
location: document.getElementById('location').value,
notes: document.getElementById('notes').value
};

plants.push(plant);
savePlants();
renderPlants();

alert('Plant saved');

document.getElementById('name').value='';
document.getElementById('location').value='';
document.getElementById('notes').value='';
}

function renderPlants(){
const q = document.getElementById('search').value.toLowerCase();
const results = document.getElementById('results');
results.innerHTML='';

plants
.filter(p =>
p.name.toLowerCase().includes(q) ||
p.category.toLowerCase().includes(q) ||
p.location.toLowerCase().includes(q)
)
.forEach((p,i)=>{
const div = document.createElement('div');
div.className='card';
div.innerHTML=`
<h3>${p.name}</h3>
<div class="small">${p.category}</div>
<p><strong>Location:</strong> ${p.location}</p>
<p>${p.notes}</p>
<button onclick="deletePlant(${i})">Delete</button>
`;
results.appendChild(div);
});
}

function deletePlant(i){
plants.splice(i,1);
savePlants();
renderPlants();
}

renderPlants();
</script>

</body>
</html>
